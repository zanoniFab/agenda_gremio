name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-cd-${{ github.ref }}
  cancel-in-progress: true

env:
  IMAGE_NAME: agenda-gremio-alert
  TERRAFORM_VERSION: 1.9.8

jobs:
  repository-checks:
    name: Repository checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check required files
        shell: bash
        run: |
          set -euo pipefail
          test -s README.md
          test -s .github/workflows/ci.yml
          test -s Dockerfile
          test -s compose.yaml
          test -s scripts/build-container.ps1
          test -s scripts/run-container.ps1
          test -s scripts/deploy-infra-container.ps1
          test -s docs/relatorio-final.md
          test -s docs/fluxo-devops.mmd
          test -s infra/terraform/main.tf
          test -s infra/terraform/variables.tf
          test -s tests/test_handler.py

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compile Python support files
        run: python -m compileall infra/terraform/lambda

      - name: Run unit tests
        run: python -m unittest discover -s tests -p "test_*.py"

  terraform:
    name: Terraform validation
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: infra/terraform

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TERRAFORM_VERSION }}

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive

      - name: Initialize Terraform
        run: terraform init -backend=false

      - name: Validate Terraform
        run: terraform validate

  container:
    name: Container build and smoke test
    runs-on: ubuntu-latest
    needs:
      - repository-checks

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build --file Dockerfile --tag "${IMAGE_NAME}:${GITHUB_SHA}" .

      - name: Start Lambda container
        run: |
          docker run \
            --detach \
            --rm \
            --name agenda-gremio-alert-ci \
            --publish 9000:8080 \
            --env SENDER_EMAIL=ci-sender@example.com \
            --env RECIPIENT_EMAIL=ci-recipient@example.com \
            "${IMAGE_NAME}:${GITHUB_SHA}"

      - name: Invoke Lambda container
        shell: bash
        run: |
          set -euo pipefail

          for attempt in {1..10}; do
            if curl --fail --silent --show-error \
              --request POST \
              "http://localhost:9000/2015-03-31/functions/function/invocations" \
              --data '{"source":"ci"}' > response.json; then
              break
            fi

            if [ "$attempt" -eq 10 ]; then
              exit 1
            fi

            sleep 2
          done

          cat response.json
          grep -Eq '"statusCode"[[:space:]]*:[[:space:]]*200' response.json

      - name: Stop Lambda container
        if: always()
        run: docker stop agenda-gremio-alert-ci || true

  delivery:
    name: Continuous delivery package
    runs-on: ubuntu-latest
    needs:
      - repository-checks
      - terraform
      - container
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Build release Docker image
        run: docker build --file Dockerfile --tag "${IMAGE_NAME}:${GITHUB_SHA}" .

      - name: Package delivery artifacts
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist

          docker save "${IMAGE_NAME}:${GITHUB_SHA}" | gzip > "dist/${IMAGE_NAME}-${GITHUB_SHA}.tar.gz"

          python - <<'PY'
          from pathlib import Path
          from zipfile import ZIP_DEFLATED, ZipFile

          dist = Path("dist")
          with ZipFile(dist / "agenda-gremio-lambda.zip", "w", ZIP_DEFLATED) as package:
              package.write("infra/terraform/lambda/handler.py", "handler.py")
          PY

          cat > dist/manifest.txt <<EOF
          project=agenda-gremio
          image=${IMAGE_NAME}:${GITHUB_SHA}
          lambda_package=agenda-gremio-lambda.zip
          commit=${GITHUB_SHA}
          EOF

      - name: Upload delivery artifacts
        uses: actions/upload-artifact@v4
        with:
          name: agenda-gremio-delivery-${{ github.sha }}
          path: dist/
